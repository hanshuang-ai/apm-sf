schema: 1
name: bugfix-artifact-repair
description: 记录 bug，修补 spec/plan/tasks，并验证规格产物一致性

stages:
  - id: report
    kind: skill
    use: tc-bugfix-report
    args: "${arguments}"
    produces:
      - bug-report

  - id: patch-artifacts
    kind: skill
    use: tc-bugfix-patch
    requires:
      - bug-report
    produces:
      - spec.md
      - plan.md
      - tasks.md

  - id: verify-artifacts
    kind: skill
    use: tc-bugfix-verify
    requires:
      - spec.md
    gate:
      type: pass
    on_failure: stop

  - id: handoff
    kind: note
    description: 规格产物已修补并验证。下一步根据项目情况运行 tc.implement 或手动修复代码。
